  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1a1a18;
      --ink-light: #4a4a44;
      --ink-faint: #8a8a80;
      --paper: #f7f5f0;
      --paper-warm: #efecea;
      --rule: #d4d0c8;
      --accent: #8b6914;
    }

    html { font-size: 18px; scroll-behavior: smooth; }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'EB Garamond', Georgia, serif;
      line-height: 1.7;

    }

    /* ── MASTHEAD ── */
    .masthead {
      border-bottom: 1px solid var(--ink);
      padding: 2.5rem 0 1.8rem;
      text-align: center;
    }

    .masthead-inner {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    .publication-name {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: clamp(1.9rem, 5vw, 2.8rem);
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink);
      line-height: 1.1;
    }

    .tagline {
      font-family: 'Inter', sans-serif;
      font-size: 0.72rem;
      font-weight: 300;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-top: 0.6rem;
    }

    /* ── LANGUAGE NAV ── */
    .lang-nav {
      border-bottom: 1px solid var(--rule);
      padding: 0.9rem 0;
      text-align: center;
    }

    .lang-nav-inner {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 2rem;
      display: flex;
      justify-content: center;
      gap: 2rem;
    }

    .lang-btn {
      font-family: 'Inter', sans-serif;
      font-size: 0.68rem;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-faint);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.2rem 0;
      border-bottom: 1px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }

    .lang-btn:hover,
    .lang-btn.active {
      color: var(--ink);
      border-bottom-color: var(--ink);
    }

    /* ── ISSUE HEADER ── */
    .issue-header {
      max-width: 720px;
      margin: 3.5rem auto 0;
      padding: 0 2rem;
      border-bottom: 1px solid var(--rule);
      padding-bottom: 1.2rem;
    }

    .issue-label {
      font-family: 'Inter', sans-serif;
      font-size: 0.65rem;
      font-weight: 300;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink-faint);
    }

    /* ── ARTICLE LIST ── */
    .articles {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 2rem 6rem;
    }

    .article-entry {
      border-bottom: 1px solid var(--rule);
      padding: 2.8rem 0;
      cursor: pointer;
    }

    .article-entry:last-child {
      border-bottom: none;
    }

    .article-source {
      font-family: 'Inter', sans-serif;
      font-size: 0.62rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.8rem;
    }

    .article-title {
      font-size: clamp(1.4rem, 3.5vw, 1.9rem);
      font-weight: 400;
      line-height: 1.25;
      color: var(--ink);
      margin-bottom: 0.6rem;
    }

    .article-subtitle {
      font-size: 1rem;
      font-style: italic;
      color: var(--ink-light);
      line-height: 1.5;
      margin-bottom: 1.2rem;
    }

    .article-lede {
      font-size: 0.95rem;
      color: var(--ink-light);
      line-height: 1.65;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .read-more {
      display: inline-block;
      margin-top: 1rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.65rem;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-faint);
      border-bottom: 1px solid var(--rule);
      padding-bottom: 1px;
      transition: color 0.2s, border-color 0.2s;
    }

    .article-entry:hover .read-more {
      color: var(--ink);
      border-color: var(--ink);
    }

      display: none;
      max-width: 720px;
      margin: 0 auto;
      padding: 0 2rem 6rem;
    }

    .reader.open { display: block; }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.65rem;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-faint);
      background: none;
      border: none;
      cursor: pointer;
      padding: 2.5rem 0 2rem;
      transition: color 0.2s;

    .reader-source {
      font-family: 'Inter', sans-serif;
      font-size: 0.62rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1rem;
    }

    .reader-title {
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      font-weight: 400;
      line-height: 1.2;
      margin-bottom: 0.8rem;
    }

    .reader-subtitle {
      font-size: 1.1rem;
      font-style: italic;
      color: var(--ink-light);
      line-height: 1.55;
      margin-bottom: 2.5rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--rule);
    }

    .reader-news-block {
      font-size: 0.88rem;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      color: var(--ink-light);
      line-height: 1.75;
      margin-bottom: 2.5rem;
      padding: 1.5rem 1.8rem;
      background: var(--paper-warm);
      border-left: 2px solid var(--rule);
    }

    .reader-news-block .news-source-line {
      font-size: 0.62rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-bottom: 0.8rem;
    }

    .reader-body {
      font-size: 1.05rem;
      line-height: 1.85;
      color: var(--ink);
    }

    .reader-body p {
      margin-bottom: 1.5rem;
    }

    .reader-body p:last-child {
      margin-bottom: 0;
    }

    .subscribe-footer {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    .subscribe-block {
      border-top: 1px solid var(--ink);
      padding: 2.5rem 0;
      text-align: center;
    }

    .subscribe-text {
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-bottom: 1.2rem;
    }

    .subscribe-form {
      display: flex;
      gap: 0;
      max-width: 380px;
      margin: 0 auto;
    }

    .subscribe-input {
      flex: 1;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 300;
      padding: 0.7rem 1rem;
      border: 1px solid var(--rule);
      border-right: none;
      background: white;
      color: var(--ink);
      outline: none;
    }

    .subscribe-input:focus {
      border-color: var(--ink-light);
    }

    .subscribe-btn {
      font-family: 'Inter', sans-serif;
      font-size: 0.62rem;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 0.7rem 1.2rem;
      background: var(--ink);
      color: var(--paper);
      border: 1px solid var(--ink);
      cursor: pointer;
      transition: background 0.2s;
    }

    .subscribe-btn:hover {
      background: var(--ink-light);
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--rule);
      padding: 2rem;
      text-align: center;
    }

    footer p {
      font-family: 'Inter', sans-serif;
      font-size: 0.62rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--ink-faint);
    }

    /* ── COMING SOON LANG ── */
    .coming-soon {
      font-family: 'Inter', sans-serif;
      font-size: 0.65rem;
      color: var(--ink-faint);
      font-style: italic;
      letter-spacing: 0;
      text-transform: none;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .subscribe-form { flex-direction: column; }
      .subscribe-input { border-right: 1px solid var(--rule); border-bottom: none; }
      .lang-nav-inner { gap: 1.2rem; flex-wrap: wrap; }
    }
  </style>
</head>

let currentLang = 'en';

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
  event.target.closest('.lang-btn').classList.add('active');

  if (lang === 'he') {
    alert('Hebrew edition coming soon. Subscribe to receive it.');
    currentLang = 'en';
    document.querySelectorAll('.lang-btn').forEach((btn, i) => { if (i === 0) btn.classList.add('active'); });
    return;
  }

  const ui = uiStrings[lang] || uiStrings['en'];
  document.querySelector('.tagline').textContent = ui.tagline;
  document.querySelector('.issue-label').textContent = ui.issueLabel;
  document.querySelector('.subscribe-text').textContent = ui.subscribeText;
  document.querySelector('.subscribe-input').placeholder = ui.subscribePlaceholder;
  document.documentElement.setAttribute('lang', lang);
  document.documentElement.setAttribute('dir', lang === 'he' ? 'rtl' : 'ltr');
  renderList();
}

function renderList() {
  const list = document.getElementById('article-list');
  const data = articles[currentLang] || articles['en'];
  const ui = uiStrings[currentLang] || uiStrings['en'];

  const reversed = [...data].reverse();
  list.innerHTML = reversed.map((a, i) => `
    <div class="article-entry" onclick="openArticle(${data.length - 1 - i})">
      <div class="article-source">${a.tag} &nbsp;·&nbsp; ${a.source}</div>
      <h2 class="article-title">${a.title}</h2>
      <p class="article-subtitle">${a.subtitle}</p>
      <p class="article-lede">${a.lede}</p>
      <span class="read-more">${ui.readMore}</span>
    </div>
  `).join('');
}

function openArticle(index) {
  const data = articles[currentLang] || articles['en'];
  const ui = uiStrings[currentLang] || uiStrings['en'];
  const a = data[index];

  const bodyHTML = a.body.map(p => `<p>${p}</p>`).join('');

  document.getElementById('reader-content').innerHTML = `
    <div class="reader-source">${a.tag} &nbsp;·&nbsp; ${a.source}</div>
    <h1 class="reader-title">${a.title}</h1>
    <p class="reader-subtitle">${a.subtitle}</p>
    <div class="reader-news-block">
      <div class="news-source-line">${a.news.source}</div>
      ${a.news.text.split('\n\n').map(p => `<p style="margin-bottom:0.8rem">${p}</p>`).join('')}
    </div>
    <div class="reader-body">${bodyHTML}</div>
  `;

  document.querySelector('.back-btn').textContent = '← ' + ui.backBtn;
  document.getElementById('list-view').style.display = 'none';
  document.getElementById('reader-view').classList.add('open');
  window.scrollTo(0, 0);
}

function closeReader() {
  document.getElementById('reader-view').classList.remove('open');
  document.getElementById('list-view').style.display = 'block';
  window.scrollTo(0, 0);
}

function handleSubscribe(e) {
  e.preventDefault();
  const email = e.target.querySelector('input').value;
  window.location.href = `https://theunplayednote.substack.com/subscribe?email=${encodeURIComponent(email)}`;
}
